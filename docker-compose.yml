services:
  backend:
    build: ./backend
    container_name: keystone-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_pycache:/app/__pycache__

  frontend:
    build: ./frontend
    container_name: keystone-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_pycache:
  frontend_node_modules:
